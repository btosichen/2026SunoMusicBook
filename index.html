<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>九年級AI有聲繪本圖書館</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 Google 字體 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- 載入 Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out forwards;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-amber-50 via-rose-50 to-cyan-50 p-6 md:p-8 text-slate-800 flex flex-col items-center">

  <!-- 標題區塊 -->
  <header class="w-full max-w-4xl text-center relative z-10 mb-8">
    <div class="inline-block relative">
      <div class="absolute -inset-1 bg-gradient-to-r from-amber-400 to-orange-500 rounded-3xl blur opacity-30 animate-pulse"></div>
      <h1 class="relative bg-white px-8 py-4 rounded-3xl shadow-xl text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-500 to-orange-500 flex items-center justify-center gap-3">
        <i data-lucide="book-open" class="w-8 h-8 md:w-10 md:h-10 text-amber-500"></i>
        班級有聲繪本圖書館
        <i data-lucide="sparkles" class="w-8 h-8 md:w-10 md:h-10 text-orange-500"></i>
      </h1>
    </div>
    <p class="mt-4 text-slate-600 font-medium text-lg">戴上耳機，一起進入同學們創作的奇幻故事世界吧！🎧</p>
  </header>

  <!-- 讀取中狀態 -->
  <div id="loading-state" class="w-full max-w-2xl flex flex-col items-center justify-center py-20 bg-white/60 rounded-3xl border-2 border-dashed border-amber-200">
    <i data-lucide="loader-2" class="w-12 h-12 text-amber-500 animate-spin mb-4"></i>
    <h3 class="text-2xl font-bold text-slate-600">正在讀取試算表資料...</h3>
    <p class="text-slate-400 mt-2">請稍候，正在準備小作家們的作品</p>
  </div>

  <!-- 錯誤狀態 -->
  <div id="error-state" class="hidden w-full max-w-2xl flex flex-col items-center justify-center py-20 bg-white/60 rounded-3xl border-2 border-dashed border-rose-200 text-center px-6">
    <span class="text-6xl mb-4 block">🚨</span>
    <h3 class="text-2xl font-bold text-slate-600">讀取失敗</h3>
    <p id="error-message" class="text-rose-500 mt-2"></p>
  </div>

  <!-- 主要內容區 (初始隱藏) -->
  <div id="main-content" class="hidden w-full max-w-5xl flex flex-col lg:flex-row gap-8 items-start">
    
    <!-- 左側主要區塊：選單與置中卡片 -->
    <div class="w-full lg:w-2/3 flex flex-col gap-6">
      
      <!-- 下拉式選單區塊 -->
      <div class="bg-white rounded-3xl p-6 shadow-xl border border-amber-100 relative z-20">
        <label for="student-select" class="block text-lg font-bold text-slate-700 mb-3 flex items-center gap-2">
          <i data-lucide="chevron-down" class="w-5 h-5 text-amber-500"></i> 
          請選擇你想欣賞的作品：
        </label>
        <div class="relative">
          <select
            id="student-select"
            onchange="handleSelectChange(event)"
            class="w-full appearance-none bg-amber-50 border-2 border-amber-200 text-slate-700 text-lg font-bold rounded-2xl px-5 py-4 pr-12 focus:outline-none focus:ring-4 focus:ring-amber-200/50 focus:border-amber-400 transition-all cursor-pointer shadow-inner"
          >
            <!-- 選項將由 JS 動態產生 -->
          </select>
          <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-amber-500">
            <i data-lucide="chevron-down" class="w-6 h-6"></i>
          </div>
        </div>
      </div>

      <!-- 正中間：單一作品展示區 -->
      <div class="w-full transition-all duration-500" id="card-container">
        <!-- 空白等待狀態 -->
        <div id="card-empty-state" class="bg-white/50 border-2 border-dashed border-slate-300 rounded-[2rem] p-16 flex flex-col items-center justify-center text-center shadow-sm">
          <span class="text-6xl mb-4 opacity-50 grayscale block">👆</span>
          <h3 class="text-2xl font-bold text-slate-600">等待探索中</h3>
          <p class="text-slate-500 mt-2 text-lg">請從上方選單選擇一位同學，即可觀看他的繪本作品！</p>
        </div>
        
        <!-- 卡片內容 (由 JS 動態產生) -->
        <div id="student-card" class="hidden relative bg-white rounded-[2.5rem] p-6 md:p-10 shadow-2xl border-2 transition-all duration-500 flex flex-col">
          <!-- 內容將在這裡生成 -->
        </div>
      </div>
    </div>

    <!-- 右側邊欄：排行榜與進度條 -->
    <div class="w-full lg:w-1/3 flex flex-col gap-6">
      
      <!-- 排行榜 -->
      <div class="bg-white rounded-3xl p-6 shadow-xl border border-rose-100">
        <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-rose-600">
          <i data-lucide="trophy" class="w-6 h-6"></i>
          最受歡迎 Top 3
        </h2>
        <div id="leaderboard-content">
          <!-- 排行榜內容由 JS 生成 -->
        </div>
      </div>

      <!-- 班級整體進度 -->
      <div class="bg-white rounded-3xl p-6 shadow-xl border border-cyan-100">
        <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-cyan-600">
          <i data-lucide="book-open" class="w-6 h-6"></i>
          全班上架進度
        </h2>
        <div class="text-center">
          <div class="flex justify-between items-end mb-2">
            <span class="text-sm text-slate-500 font-medium">進度條</span>
            <span id="progress-text" class="text-lg font-black text-emerald-500">
              0 / 0 本
            </span>
          </div>
          <div class="w-full bg-slate-100 rounded-full h-4 overflow-hidden shadow-inner">
            <div id="progress-bar" class="bg-gradient-to-r from-emerald-400 to-cyan-400 h-4 rounded-full transition-all duration-1000 ease-out relative" style="width: 0%">
              <div class="absolute inset-0 bg-white/20 w-full h-full animate-pulse"></div>
            </div>
          </div>
          <p class="text-xs text-slate-400 mt-3 font-medium">只要試算表有填寫網址，就會自動計算為已上架喔！</p>
        </div>
      </div>

    </div>
  </div>

  <script>
    // --- 核心資料與狀態 ---
    let studentsData = [];
    let interactions = JSON.parse(localStorage.getItem('class_portfolio_data')) || {};
    let selectedStudentId = '';
    let isCommentOpen = false;

    const ENCOURAGEMENTS = [
      "這故事超有趣🔥",
      "配音太生動了👏",
      "情節設計很棒✨",
      "我也想看下一集😆"
    ];

    // --- 工具函數 ---
    const generateNickname = () => {
      const num = String(Math.floor(Math.random() * 99) + 1).padStart(2, '0');
      return `小小觀察員${num}`;
    };

    const parseCSV = (str) => {
      const result = [];
      let row = [];
      let inQuotes = false;
      let val = '';
      for (let i = 0; i < str.length; i++) {
        let char = str[i];
        if (char === '"') {
          if (inQuotes && str[i + 1] === '"') {
            val += '"'; i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(val); val = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && str[i + 1] === '\n') i++;
          row.push(val); result.push(row);
          row = []; val = '';
        } else {
          val += char;
        }
      }
      if (val || row.length > 0) { row.push(val); result.push(row); }
      return result;
    };

    const saveInteractions = () => {
      localStorage.setItem('class_portfolio_data', JSON.stringify(interactions));
    };

    // --- 初始化與資料讀取 ---
    async function init() {
      // 繪製初始 Icons
      lucide.createIcons();

      try {
        const sheetId = '1RiNHdFCZ_0hFGSEesEW0L7FPSk4kIPa-PNw6VhMiCNY';
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
        const response = await fetch(url);
        
        if (!response.ok) throw new Error('無法連線到試算表');
        
        const csvText = await response.text();
        const rows = parseCSV(csvText);
        
        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          if (row.length < 1 || (!row[0] && !row[1])) continue;
          
          const id = row[0]?.trim() || '';
          if (!id) continue;
          const link = row[1]?.trim() || '';
          
          studentsData.push({
            id: id,
            title: `繪本小品 - 繪本小品 ${id}`,
            link: link,
            submitted: link !== ''
          });
        }
        
        // 隱藏讀取畫面，顯示主畫面
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        document.getElementById('main-content').classList.add('flex');

        // 渲染畫面元件
        renderDropdown();
        renderProgress();
        renderLeaderboard();
        lucide.createIcons();

      } catch (err) {
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('error-state').classList.remove('hidden');
        document.getElementById('error-state').classList.add('flex');
        document.getElementById('error-message').textContent = "無法讀取資料，請確認 Google 試算表已設定為「知道連結的人均可檢視」。(" + err.message + ")";
      }
    }

    // --- 渲染函數 ---
    function renderDropdown() {
      const select = document.getElementById('student-select');
      select.innerHTML = '<option value="" disabled selected>👇 點擊這裡展開名單...</option>';
      
      studentsData.forEach(student => {
        const option = document.createElement('option');
        option.value = student.id;
        option.textContent = `繪本故事: ${student.id} ｜ ${student.submitted ? '✅ 已上架' : '✍️ 創作中'}`;
        select.appendChild(option);
      });
      // 同步目前選取的 ID
      if (selectedStudentId) select.value = selectedStudentId;
    }

    function renderProgress() {
      const submittedCount = studentsData.filter(d => d.submitted).length;
      const totalCount = studentsData.length;
      const percentage = totalCount > 0 ? (submittedCount / totalCount) * 100 : 0;
      
      document.getElementById('progress-text').textContent = `${submittedCount} / ${totalCount} 本`;
      document.getElementById('progress-bar').style.width = `${percentage}%`;
    }

    function renderLeaderboard() {
      const container = document.getElementById('leaderboard-content');
      
      // 計算讚數並排序
      const top3Works = studentsData.map(student => ({
        ...student,
        likes: interactions[student.id]?.likes || 0
      }))
      .filter(s => s.likes > 0 && s.submitted)
      .sort((a, b) => b.likes - a.likes)
      .slice(0, 3);

      if (top3Works.length === 0) {
        container.innerHTML = `<p class="text-slate-400 text-sm text-center py-4 bg-slate-50 rounded-2xl">目前還沒有人按讚喔<br/>趕快去賞顆愛心！</p>`;
        return;
      }

      let html = '<ul class="space-y-3">';
      top3Works.forEach((work, index) => {
        const bgColors = ['bg-yellow-400', 'bg-slate-300', 'bg-amber-600'];
        const badgeColor = bgColors[index] || 'bg-slate-200';
        
        html += `
          <li onclick="handleSelectStudent('${work.id}')" class="flex items-center justify-between p-3 rounded-2xl bg-gradient-to-r from-slate-50 to-white border border-slate-100 shadow-sm transition-transform hover:-translate-y-1 cursor-pointer hover:border-amber-200" title="點擊前往觀看">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full flex items-center justify-center font-black text-white shadow-inner ${badgeColor}">
                ${index + 1}
              </div>
              <span class="font-bold text-slate-700">${work.id.slice(-3)}</span>
            </div>
            <div class="flex items-center gap-1 text-pink-500 font-bold bg-pink-50 px-2 py-1 rounded-lg">
              <i data-lucide="heart" class="w-4 h-4 fill-current"></i>
              ${work.likes}
            </div>
          </li>
        `;
      });
      html += '</ul>';
      container.innerHTML = html;
      lucide.createIcons({ root: container });
    }

    function renderCard() {
      const cardEmpty = document.getElementById('card-empty-state');
      const cardContent = document.getElementById('student-card');
      const student = studentsData.find(s => s.id === selectedStudentId);

      if (!student) {
        cardEmpty.classList.remove('hidden');
        cardEmpty.classList.add('flex');
        cardContent.classList.add('hidden');
        cardContent.classList.remove('flex');
        return;
      }

      // 取得互動資料
      const data = interactions[student.id] || { likes: 0, likedByMe: false, comments: [] };
      const isMissing = !student.submitted;

      // 切換顯示狀態
      cardEmpty.classList.add('hidden');
      cardEmpty.classList.remove('flex');
      cardContent.classList.remove('hidden');
      cardContent.classList.add('flex');

      // 設定卡片外觀樣式
      cardContent.className = `relative bg-white rounded-[2.5rem] p-6 md:p-10 shadow-2xl border-2 transition-all duration-500 flex flex-col ${isMissing ? 'border-slate-200 grayscale-[0.6] opacity-90' : 'border-amber-200 ring-4 ring-amber-50 ring-offset-4 group'}`;

      // 組合 HTML
      let html = `
        ${!isMissing ? `<div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br from-amber-100 to-orange-100 rounded-bl-[5rem] rounded-tr-[2.5rem] opacity-50 z-0 transition-transform group-hover:scale-110"></div>` : ''}
        
        <!-- 標頭資訊 -->
        <div class="flex justify-between items-start mb-6 md:mb-8 relative z-10">
          <div class="flex flex-col pr-2">
            <span class="text-sm md:text-base text-amber-500 font-bold uppercase tracking-wider flex items-center gap-2">
              <div class="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center"><i data-lucide="book-open" class="w-4 h-4"></i></div> 
              小作家 ${student.id}
            </span>
            <span class="text-3xl md:text-4xl font-black text-slate-700 mt-3 leading-tight">${student.title}</span>
          </div>
          
          ${isMissing ? `
            <div class="flex items-center gap-1.5 px-4 py-2 rounded-2xl bg-slate-100 text-slate-500 font-bold text-base shrink-0 border border-slate-200">
              <i data-lucide="x-circle" class="w-5 h-5"></i><span>創作中</span>
            </div>
          ` : `
            <div class="flex items-center gap-1.5 px-4 py-2 rounded-2xl bg-emerald-100 text-emerald-600 font-bold text-base shadow-sm shrink-0 border border-emerald-200">
              <i data-lucide="check-circle-2" class="w-5 h-5"></i><span>已上架</span>
            </div>
          `}
        </div>

        <!-- 主要內容區 -->
        <div class="flex-grow flex flex-col justify-center relative z-10 my-4">
          ${isMissing ? `
            <div class="h-48 md:h-64 bg-slate-50 rounded-[2rem] border-4 border-dashed border-slate-200 flex flex-col items-center justify-center text-slate-400">
              <span class="text-5xl md:text-6xl mb-4 grayscale opacity-50 block animate-bounce">✍️</span>
              <span class="font-bold text-xl md:text-2xl">作者正在努力為繪本配音中...</span>
              <span class="text-slate-400 mt-2">晚點再來看看吧！</span>
            </div>
          ` : `
            <a href="${student.link}" target="_blank" rel="noopener noreferrer" class="group/btn relative h-48 md:h-64 bg-gradient-to-br from-amber-400 via-orange-400 to-rose-400 rounded-[2rem] flex flex-col items-center justify-center text-white overflow-hidden shadow-lg transition-transform active:scale-95 hover:shadow-2xl">
              <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCI+PGNpcmNsZSBjeD0iMTIiIGN5PSIxMiIgcj0iMiIgZmlsbD0icmdiYSgyNTUsMjU1LDI1NSwwLjIpIi8+PC9zdmc+')] opacity-30"></div>
              <div class="absolute inset-0 bg-white/20 translate-y-full group-hover/btn:translate-y-0 transition-transform duration-500 ease-in-out"></div>
              
              <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mb-4 backdrop-blur-sm border border-white/30 group-hover/btn:scale-110 transition-transform duration-300">
                <i data-lucide="headphones" class="w-10 h-10 relative z-10"></i>
              </div>
              <span class="font-black text-2xl md:text-3xl relative z-10 tracking-widest drop-shadow-md">點擊開啟有聲繪本</span>
              <span class="text-white/80 font-medium mt-2 flex items-center gap-1 text-sm"><i data-lucide="sparkles" class="w-4 h-4"></i> 將會在新分頁中開啟檔案</span>
            </a>
          `}
        </div>

        <!-- 互動條 -->
        <div class="flex gap-4 mt-6 pt-6 border-t-2 relative z-10 border-slate-100">
          <button onclick="handleLike()" class="flex-1 flex items-center justify-center gap-3 py-4 rounded-2xl font-bold text-lg transition-all active:scale-90 ${data.likedByMe ? 'bg-pink-100 text-pink-600 shadow-inner border-2 border-pink-200' : 'bg-slate-50 text-slate-500 border-2 border-slate-100 hover:bg-pink-50 hover:text-pink-500 hover:border-pink-200'}">
            <i data-lucide="heart" class="w-7 h-7 transition-transform ${data.likedByMe ? 'fill-current scale-110' : 'hover:scale-110'}"></i>
            ${data.likes > 0 ? `${data.likes} 個愛心` : '給個愛心'}
          </button>
          
          <button onclick="handleToggleComment()" class="flex-1 flex items-center justify-center gap-3 py-4 rounded-2xl font-bold text-lg transition-all active:scale-90 ${isCommentOpen || data.comments.length > 0 ? 'bg-blue-50 text-blue-600 border-2 border-blue-200' : 'bg-slate-50 text-slate-500 border-2 border-slate-100 hover:bg-blue-50 hover:text-blue-500 hover:border-blue-200'}">
            <i data-lucide="message-circle" class="w-7 h-7"></i>
            ${data.comments.length > 0 ? `${data.comments.length} 則留言` : '寫下鼓勵'}
          </button>
        </div>

        <!-- 展開的留言區 -->
        ${isCommentOpen ? `
          <div class="mt-6 pt-6 border-t-2 border-slate-100 animate-fadeIn">
            
            <div class="flex flex-wrap gap-2 mb-4">
              <span class="text-sm font-bold text-slate-500 flex items-center mr-2">快速鼓勵：</span>
              ${ENCOURAGEMENTS.map(text => `
                <button onclick="handleAddComment('${text}')" class="text-sm font-bold bg-amber-100 text-amber-700 px-3 py-2 rounded-xl hover:bg-amber-200 transition-colors active:scale-95 flex items-center gap-1 border border-amber-200">
                  ${text.includes('🔥') ? '' : '<i data-lucide="sparkles" class="w-4 h-4"></i>'}
                  ${text}
                </button>
              `).join('')}
            </div>

            <form onsubmit="handleSubmitComment(event)" class="relative flex items-center mb-6">
              <input type="text" id="comment-input" oninput="handleInputChange(this)" placeholder="寫點鼓勵的話... (限50字內)" maxlength="50" class="w-full bg-slate-50 border-2 border-slate-200 rounded-2xl py-3 pl-4 pr-14 text-base focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-400 transition-all font-medium text-slate-700" />
              <button type="submit" id="comment-submit-btn" disabled class="absolute right-2 p-2 text-blue-500 hover:bg-blue-100 rounded-xl disabled:opacity-30 disabled:hover:bg-transparent transition-colors opacity-30">
                <i data-lucide="send" class="w-5 h-5"></i>
              </button>
            </form>

            <div class="space-y-4 max-h-64 overflow-y-auto pr-2 custom-scrollbar bg-slate-50/50 p-4 rounded-2xl border border-slate-100">
              ${data.comments.length === 0 ? `
                <p class="text-center text-slate-400 text-base py-6 font-medium">快來成為第一個留下鼓勵的人吧！✏️</p>
              ` : data.comments.map(comment => `
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex flex-col gap-2">
                  <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                    <span class="font-bold text-slate-700 text-sm flex items-center gap-2">
                      <div class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xs">👤</div>
                      ${comment.author}
                    </span>
                    <span class="text-xs text-slate-400 font-medium">${comment.timestamp}</span>
                  </div>
                  <p class="text-slate-600 break-words text-base leading-relaxed">${comment.text}</p>
                </div>
              `).join('')}
            </div>
          </div>
        ` : ''}
      `;

      cardContent.innerHTML = html;
      lucide.createIcons({ root: cardContent }); // 重新渲染剛產生的 Icon
    }

    // --- 互動事件處理 ---
    window.handleSelectChange = function(event) {
      selectedStudentId = event.target.value;
      isCommentOpen = false; // 切換學生時關閉留言板
      renderCard();
    };

    window.handleSelectStudent = function(id) {
      selectedStudentId = id;
      isCommentOpen = false;
      document.getElementById('student-select').value = id; // 同步下拉選單
      renderCard();
      // 畫面平滑捲動到卡片位置
      document.getElementById('student-select').scrollIntoView({ behavior: 'smooth', block: 'center' });
    };

    window.handleLike = function() {
      if (!selectedStudentId) return;
      
      const current = interactions[selectedStudentId] || { likes: 0, likedByMe: false, comments: [] };
      const newLikedStatus = !current.likedByMe;
      const newLikesCount = newLikedStatus ? current.likes + 1 : Math.max(0, current.likes - 1);
      
      interactions[selectedStudentId] = { ...current, likedByMe: newLikedStatus, likes: newLikesCount };
      saveInteractions();
      
      renderCard();
      renderLeaderboard();
    };

    window.handleToggleComment = function() {
      isCommentOpen = !isCommentOpen;
      renderCard();
      
      // 開啟時自動對焦輸入框
      if (isCommentOpen) {
        setTimeout(() => {
          const input = document.getElementById('comment-input');
          if (input) input.focus();
        }, 100);
      }
    };

    window.handleAddComment = function(text) {
      if (!text.trim() || !selectedStudentId) return;
      
      const current = interactions[selectedStudentId] || { likes: 0, likedByMe: false, comments: [] };
      const newComment = {
        id: Date.now().toString(),
        author: generateNickname(),
        text: text,
        timestamp: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' })
      };
      
      interactions[selectedStudentId] = {
        ...current,
        comments: [newComment, ...current.comments]
      };
      saveInteractions();
      renderCard();
    };

    window.handleSubmitComment = function(event) {
      event.preventDefault();
      const input = document.getElementById('comment-input');
      if (input && input.value) {
        window.handleAddComment(input.value);
      }
    };

    window.handleInputChange = function(input) {
      const btn = document.getElementById('comment-submit-btn');
      if (input.value.trim().length > 0) {
        btn.removeAttribute('disabled');
        btn.classList.remove('opacity-30');
      } else {
        btn.setAttribute('disabled', 'true');
        btn.classList.add('opacity-30');
      }
    };

    // 啟動程式
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
